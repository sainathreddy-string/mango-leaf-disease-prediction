<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background-color: #3498db;
            font-family: Arial, sans-serif;
            padding: 50px;
            text-align: center;
            color: white;
        }
        form {
            display: inline-block;
            background: white;
            padding: 40px;
            border-radius: 10px;
            color: black;
        }
        input, button {
            margin: 10px;
            padding: 12px;
            width: 300px;
            font-size: 16px;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1abc9c;
        }
    </style>
</head>
<body>
    <h2>Login</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
</body>
</html>
